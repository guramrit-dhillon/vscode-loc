name: CI

on:
  push:
    branches: [ main, develop, claude/* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build all packages
        run: npm run build

      - name: Package Punjabi extension
        run: npm run package --workspace=packages/punjabi

      - name: Package Hindi extension
        run: npm run package --workspace=packages/hindi

      - name: Verify VSIX files
        run: |
          ls -lh packages/punjabi/*.vsix
          ls -lh packages/hindi/*.vsix

      - name: Upload VSIX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vsix-packages
          path: packages/*/*.vsix
