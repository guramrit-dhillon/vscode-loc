name: Publish to VSCode Marketplace

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (punjabi, hindi, or all)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - punjabi
          - hindi

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: ${{ github.event.inputs.package == 'all' && fromJSON('["punjabi", "hindi"]') || fromJSON(format('["{0}"]', github.event.inputs.package)) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.package }} package
        run: npm run build --workspace=packages/${{ matrix.package }}

      - name: Package ${{ matrix.package }} extension
        run: npm run package --workspace=packages/${{ matrix.package }}

      - name: Publish ${{ matrix.package }} to VSCode Marketplace
        run: |
          cd packages/${{ matrix.package }}
          npx @vscode/vsce publish -p ${{ secrets.VSCODE_MARKETPLACE_TOKEN }}
        env:
          VSCODE_MARKETPLACE_TOKEN: ${{ secrets.VSCODE_MARKETPLACE_TOKEN }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}-vsix
          path: packages/${{ matrix.package }}/*.vsix
